<!DOCTYPE html>
<html>
<head>
    <title>Notes App</title>
</head>
<body>

    <h2>My Notes 📝</h2>

    <form action="/add" method="POST">
        <input type="text" name="note" placeholder="Write a note..." required>
        <button type="submit">Add</button>
    </form>

    <hr>

    {% for note in notes %}
        <p>
            {{ note[1] }}
            <a href="/delete/{{ note[0] }}">❌</a>
        </p>
    {% endfor %}

</body>
</html>
